# Hugo configuration file
title: Asad Shahid
baseURL: https://asadshahid04.github.io/asadshahid-blog/

enableRobotsTXT: true
enableGitInfo: true

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

languages:
  en:
    languageName: English
    weight: 1

menu:
  main:
    - name: Blog
      pageRef: /blog
      weight: 1
    - name: Projects
      pageRef: /projects
      weight: 2
    - name: About
      pageRef: /about
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/AsadShahid04"
      params:
        icon: github
    - name: LinkedIn
      weight: 6
      url: "https://linkedin.com/in/asadshahid04"
      params:
        icon: linkedin

params:
  description: AI Infrastructure Engineer • UC Berkeley • Open Source Contributor

  navbar:
    displayTitle: true
    displayLogo: false

  page:
    width: normal

  footer:
    displayCopyright: true
    displayPoweredBy: false

  editURL:
    enable: false

  blog:
    list:
      displayTags: true
